<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="ServantSync mark">
  <title>ServantSync logo mark</title>
  <defs>
    <!-- Cool side: deep indigo → violet. Anchors the brand in calm,
         service-oriented gravitas. -->
    <linearGradient id="coolSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <!-- Warm side: amber → rose. Picking amber-not-red keeps the
         mark from feeling liturgical. -->
    <linearGradient id="warmSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="55%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>

  <!-- Transparent canvas pad. The mark must compose on a dark navbar
       (Components/Layout/NavMenu.razor.css backdrop is rgba(255,255,255,0.06))
       and on light marketing surfaces, so no opaque background. -->
  <rect width="512" height="512" fill="none"/>

  <!-- Two stylized figures whose raised arms form a heart-shaped
       void in the negative space.

       Round-AU iteration 5 design (after rounds 1-4 all had
       various geometric issues, including the "towers" issue
       flagged by code review in round 4: the figure outer tops
       peaked at y=75 while the cleft was at y=100, making the
       figures look like they had heads sticking up above the
       heart). This iteration aligns the outer top with the cleft:
       both peaks are at y=100, so the heart is the TOPMOST feature
       of the mark, with the figures' bodies extending below.

       Geometry:
         • 52 px cleft at y=100 (from x=230 to x=282)
         • 122 px lobes at y=135 (only 35 px below the cleft)
         • Heart point at y=340 (on the centerline)
         • Outer top peaks at y=100 (aligned with the cleft, no
           "towers" above the heart)

       Inner side of left figure: (230, 100) → (195, 135) → (256, 340).
       The first segment is short and shallow to form the LOBE.
       The second segment is long and curves smoothly to the heart
       POINT. Mirrored for the right figure. -->

  <!-- Left figure (cool). Top at (230, 100); heart point at (256, 340);
       outer side bulges to (60, 250). -->
  <path d="M 230 100
           C 220 115, 200 115, 195 135
           C 190 220, 220 300, 256 340
           C 230 370, 200 390, 180 390
           C 140 410, 100 390, 80 350
           C 60 300, 60 200, 80 150
           C 100 120, 140 100, 180 100
           C 205 100, 220 100, 230 100 Z"
        fill="url(#coolSide)"/>

  <!-- Right figure (warm). Mirrored across x=256. -->
  <path d="M 282 100
           C 292 115, 312 115, 317 135
           C 322 220, 292 300, 256 340
           C 282 370, 312 390, 332 390
           C 372 410, 412 390, 432 350
           C 452 300, 452 200, 432 150
           C 412 120, 372 100, 332 100
           C 307 100, 292 100, 282 100 Z"
        fill="url(#warmSide)"/>

  <!-- Bridge glint. Small warm-amber dot just above the heart cleft.
       Replaces a literal cross (the brand book explicitly bans
       religious symbols — see BRANDING.md "Why no cross") with a
       secular "spark" that crowns the heart without committing to
       any single tradition. Color is the existing `--ss-glint` token. -->
  <circle cx="256" cy="90" r="14" fill="#fbbf24"/>

  <!-- Decorative connector dots just outside each figure's outer edge.
       Round-AU iteration 4 FIX: the iteration-3 design had a dot at
       (78, 320) which sat INSIDE the figure body (the body's outer
       edge at y=320 is at x≈72, so a r=10 dot at x=78 was 88% inside
       the body and effectively invisible). Moved to (40, 320) so it
       sits clearly outside the body. Cool dots on the left, warm on
       the right. -->
  <circle cx="50" cy="200" r="12" fill="url(#coolSide)"/>
  <circle cx="40" cy="320" r="10" fill="url(#coolSide)"/>
  <circle cx="462" cy="200" r="12" fill="url(#warmSide)"/>
  <circle cx="472" cy="320" r="10" fill="url(#warmSide)"/>

  <!-- Sync arrows at the bottom. Two arcs forming a clockwise
       rotation (classic refresh-icon layout).

       Round-AU iteration 4 FIX: the iteration-3 arcs used sweep=1
       (clockwise in SVG y-down coords), which curves the top arc
       DOWN (under the chord) and the bottom arc UP (over the chord)
       — the two arcs nearly overlap in the middle, looking like a
       lens instead of a circle. Flipped both to sweep=0 so the top
       arc curves UP over the top and the bottom arc curves DOWN
       under the bottom, forming a clean circle with arrowheads at
       the right tangent directions.

       Arrowhead polygons updated for the corrected tangents:
         • Top arc ends at (292, 420) with tangent going DOWN-RIGHT
           (clockwise rotation arriving at 3-o'clock). Polygon points
           DOWN.
         • Bottom arc ends at (220, 460) with tangent going UP-LEFT
           (clockwise rotation arriving at 9-o'clock). Polygon points
           UP. -->
  <path d="M 220 420 A 40 40 0 0 0 292 420"
        fill="none" stroke="url(#coolSide)" stroke-width="14"
        stroke-linecap="round"/>
  <polygon points="280,408 304,408 292,432" fill="url(#coolSide)"/>

  <path d="M 292 460 A 40 40 0 0 0 220 460"
        fill="none" stroke="url(#warmSide)" stroke-width="14"
        stroke-linecap="round"/>
  <polygon points="232,472 208,472 220,448" fill="url(#warmSide)"/>
</svg>
