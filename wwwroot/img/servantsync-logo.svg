<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280" role="img" aria-label="ServantSync logo">
  <title>ServantSync logo</title>
  <defs>
    <linearGradient id="coolSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="warmSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="55%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- The mark reused at a smaller scale, occupying the left third
       of the layout. Same round-AU iteration-5 path data as
       servantsync-mark.svg: 52 px cleft at the top, 122 px lobes
       at y=135 (35 px below the cleft), heart point at y=340.
       Outer top peaks at y=100 (aligned with the cleft, fixing
       the round-4 "towers" issue where the figures' heads stuck
       up above the heart). Plus the iteration-4 fixes: connector
       dot at (40, 320) instead of (78, 320), sync arcs with
       sweep=0, arrowhead polygons aligned with the corrected
       tangents. The mark's <defs> above are unique-per-file
       (we don't share an external <defs> because <link href>
       cross-file is fragile and we want this file to render
       standalone in a README or email signature without a
       wrapping HTML page). -->
  <g transform="translate(10, 20) scale(0.45)">
    <path d="M 230 100
             C 220 115, 200 115, 195 135
             C 190 220, 220 300, 256 340
             C 230 370, 200 390, 180 390
             C 140 410, 100 390, 80 350
             C 60 300, 60 200, 80 150
             C 100 120, 140 100, 180 100
             C 205 100, 220 100, 230 100 Z"
          fill="url(#coolSide)"/>
    <path d="M 282 100
             C 292 115, 312 115, 317 135
             C 322 220, 292 300, 256 340
             C 282 370, 312 390, 332 390
             C 372 410, 412 390, 432 350
             C 452 300, 452 200, 432 150
             C 412 120, 372 100, 332 100
             C 307 100, 292 100, 282 100 Z"
          fill="url(#warmSide)"/>
    <circle cx="256" cy="90" r="14" fill="#fbbf24"/>
    <circle cx="50" cy="200" r="12" fill="url(#coolSide)"/>
    <circle cx="40" cy="320" r="10" fill="url(#coolSide)"/>
    <circle cx="462" cy="200" r="12" fill="url(#warmSide)"/>
    <circle cx="472" cy="320" r="10" fill="url(#warmSide)"/>
    <path d="M 220 420 A 40 40 0 0 0 292 420"
          fill="none" stroke="url(#coolSide)" stroke-width="14"
          stroke-linecap="round"/>
    <polygon points="280,408 304,408 292,432" fill="url(#coolSide)"/>
    <path d="M 292 460 A 40 40 0 0 0 220 460"
          fill="none" stroke="url(#warmSide)" stroke-width="14"
          stroke-linecap="round"/>
    <polygon points="232,472 208,472 220,448" fill="url(#warmSide)"/>
  </g>

  <!-- Wordmark. Positioned to the right of the mark with tight
       negative-letter-spacing for a dense, modern feel. Web-safe
       system-ui stack (no custom web font, no Google Fonts request)
       so the lockup renders identically on every device without a
       flash-of-unstyled-text. Weight 800 matches the new visual
       reference. -->
  <text x="260" y="155"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="76" font-weight="800" fill="url(#wordmark)"
        letter-spacing="-2">
    ServantSync
  </text>

  <!-- Tagline. Spaced caps + reduced opacity keep it as a subline,
       not a competing brand element. "VOLUNTEER MANAGEMENT & TRAINING
       SYSTEM" is the longer-but-clearer phrasing; it tells a first-
       time visitor exactly what the product is in one read, which
       is more useful on the public-facing lockup than the more
       abstract "VOLUNTEERS · IN SYNC". -->
  <text x="266" y="200"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15" font-weight="700" fill="#6d28d9"
        letter-spacing="2.4" opacity="0.85">
    VOLUNTEER MANAGEMENT &amp; TRAINING SYSTEM
  </text>
</svg>
