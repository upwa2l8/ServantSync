<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280" role="img" aria-label="ServantSync logo">
  <title>ServantSync logo</title>
  <defs>
    <linearGradient id="coolSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="warmSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="55%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetBlur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- The mark is reused at a smaller scale, occupying the left third
       of the layout. Centered roughly on (130, 140) so the right two
       thirds can carry the wordmark + tagline at full prominence. -->
  <g transform="translate(0, 0) scale(0.5)" transform-origin="130 140">
    <path d="M 184 152 C 80 152, 80 360, 184 360"
          fill="none" stroke="url(#coolSide)" stroke-width="42"
          stroke-linecap="round" filter="url(#softShadow)"/>
    <path d="M 328 152 C 432 152, 432 360, 328 360"
          fill="none" stroke="url(#warmSide)" stroke-width="42"
          stroke-linecap="round" filter="url(#softShadow)"/>
    <circle cx="184" cy="152" r="22" fill="url(#coolSide)"/>
    <circle cx="184" cy="360" r="22" fill="url(#coolSide)"/>
    <circle cx="328" cy="152" r="22" fill="url(#warmSide)"/>
    <circle cx="328" cy="360" r="22" fill="url(#warmSide)"/>
    <circle cx="256" cy="256" r="26" fill="url(#coolSide)"/>
    <circle cx="256" cy="256" r="12" fill="#fbbf24"/>
  </g>

  <!-- Wordmark. The text is positioned to the right of the mark with
       a tight negative-letter-spacing for a dense, modern feel. -->
  <text x="280" y="160"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="76" font-weight="800" fill="url(#wordmark)"
        letter-spacing="-2">
    ServantSync
  </text>

  <!-- Tagline. Spaced caps + reduced opacity keep it as a subline, not
       a competing brand element. "VOLUNTEERS · IN SYNC" reads as
       abstract enough for church groups AND secular co-ops. -->
  <text x="288" y="200"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="600" fill="#6d28d9"
        letter-spacing="6" opacity="0.78">
    VOLUNTEERS · IN SYNC
  </text>
</svg>
