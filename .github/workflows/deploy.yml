name: Deploy to Azure Container Apps

# Trigger on every push to main that touches runtime OR workflow files.
# Pull requests don't deploy (they build via ci.yml). Manual dispatch
# enables a "Re-run deploy" button on the Actions tab without a code push.
# Same trigger semantics as the old App Service workflow, with the
# Dockerfile added to the paths filter so a Dockerfile-only change
# also triggers a deploy.
on:
  push:
    branches: [main]
    paths:
      - 'Components/**'
      - 'Data/**'
      - 'Models/**'
      - 'Services/**'
      - 'Properties/**'
      - 'wwwroot/**'
      - 'Program.cs'
      - 'Dockerfile'
      - '.dockerignore'
      - '*.csproj'
      - '*.sln'
      - 'appsettings.json'
      - 'appsettings.*.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you redeploying? (audit trail comment only)'
        required: false
        default: 'Manual'

# OIDC: the workflow swaps the long-lived publish-profile secret for a
# short-lived OIDC token issued by GitHub to the App Registration's
# federated credential. Required permissions:
#   - id-token: write  -- request an OIDC token from GitHub
#   - contents: read   -- checkout the repo
#   - no other scopes  -- least-privilege
permissions:
  id-token: write
  contents: read

# Concurrency lock: a rapid second push (or a manual workflow_dispatch
# while a push-deploy is mid-flight) would otherwise race two image
# pushes + revision updates against the same Container App,
# last-write-wins with possible intermediate-state exposure. The
# `cancel-in-progress` setting makes the second job preempt the first;
# only the most recent deploy wins. Same pattern as the old App
# Service workflow.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & deploy to Azure Container Apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC federated)
        # OIDC over the old publish-profile XML secret. The App
        # Registration's federated credential must have a subject that
        # matches `repo:<owner>/<repo>:ref:refs/heads/main` (for push
        # triggers) and a claim that names the federated credentials
        # in the App Registration. If you also use a `Production`
        # protected environment for workflow_dispatch, add a second
        # federated credential with subject
        # `repo:<owner>/<repo>:environment:Production`.
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: false

      - name: ACR login (via OIDC token)
        # `az acr login` uses the AAD token from the OIDC login step
        # to authenticate to the registry -- no `AcrPull` admin user
        # secret is needed. The App Registration's service principal
        # needs the `AcrPush` role on the registry.
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image to ACR
        # Tags the image with both the immutable commit SHA and the
        # mutable `latest` tag. The deploy step pins the SHA so a
        # partially-pushed image can't be deployed; the `latest` tag
        # is left in ACR for quick manual debugging.
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/servantsync:${{ github.sha }}
            ${{ secrets.ACR_NAME }}.azurecr.io/servantsync:latest
          # Skip provenance + SBOM attestations -- not required for an
          # internal app, and they add ~30s to the push.
          provenance: false
          sbom: false
          # Useful cache from the previous successful build (GitHub's
          # built-in cache backend). First build is cold; subsequent
          # builds re-use restored layers.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure Container Apps
        # Round-ACA-1 fix: the high-level `azure/container-apps-deploy-action@v2`
        # was silently dropping the `imageToDeploy` input on this repo's
        # config, leaving the YAML's literal
        # `PLACEHOLDER-OVERRIDDEN-BY-IMAGE-TO-DEPLOY-DO-NOT-RUN` string in
        # place and az CLI refusing it with
        # "could not parse reference: PLACEHOLDER-OVERRIDDEN-...".
        # Switched to `azure/cli@v2` which calls
        # `az containerapp update --yaml --image $IMAGE` explicitly -- the
        # documented az override pattern. The bundled az is current (no
        # version pin needed for our YAML syntax). The step still works
        # through the OIDC federated login (az login --identity picks up
        # the token that azure/login@v2 issued upstream), so no other
        # workflow changes are required. This step has no `if:` so the
        # Round-ACA-1 parse-error on the original step is irrelevant.
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name "${{ secrets.ACA_NAME }}" \
              --resource-group "${{ secrets.AZURE_RG }}" \
              --yaml deploy/aca.servantsync.yaml \
              --image "${{ secrets.ACR_NAME }}.azurecr.io/servantsync:${{ github.sha }}" \
              --output none

      - name: Smoke-check (optional)
        # If the deploy sponsor supplies a smoke URL, GET it; otherwise skip.
        # NOTE: `${{ secrets.X }}` is rejected inside an `if:` conditional by
        # GitHub Actions' expression parser (error: "Unrecognized named-value:
        # 'secrets'"), and the validation failure aborts the whole job before
        # any step is dispatched. The canonical workaround is to expose the
        # secret as an `env:` variable and branch on its emptiness inside the
        # `run:` script -- semantically equivalent, valid YAML.
        env:
          SMOKE_CHECK_URL: ${{ secrets.SMOKE_CHECK_URL }}
        run: |
          if [ -n "$SMOKE_CHECK_URL" ]; then
            curl --fail --silent --show-error --max-time 30 \
              "$SMOKE_CHECK_URL" > /dev/null
            echo "Smoke check OK"
          else
            echo "SMOKE_CHECK_URL not set; skipping smoke check."
          fi
